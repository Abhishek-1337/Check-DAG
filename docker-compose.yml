services:
  backend:
    build:
      context: ./backend
    container_name: vs-pipeline-backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - BACKEND_CORS_ORIGINS=*
    restart: unless-stopped
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
    container_name: vs-pipeline-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
